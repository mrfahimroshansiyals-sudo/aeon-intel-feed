name: Hourly Intel Automation
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'template.js'  # Block the bot from triggering itself
  workflow_dispatch:
  schedule:
    - cron: '14 * * * *'

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Crucial: Gets full history tree
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai

      - name: Run Intel Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_intel.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Aeon-Intel-Bot"
          git config --global user.email "bot@aeon.intel"
          
          # 1. Fetch latest upstream state to prevent tree divergence
          git fetch origin main
          
          # 2. Stage the modified data payload file
          git add template.js
          
          # 3. Use an airtight, native index check to see if template.js actually changed
          if ! git diff --cached --quiet template.js; then
            
            # 4. Safely rebase any minor upstream history adjustments over our local state modification
            git rebase origin/main
            
            # 5. Commit using the protected perimeter safety tag [skip ci]
            git commit -m "Automated Hourly Update: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            
            # 6. Execute an atomic, clean push back to main branch
            git push origin HEAD:main
          else
            echo "No changes detected in template.js. Skipping push payload sequence to prevent loops."
          fi
