name: Hourly Intel Automation
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'template.js'  # Block the bot from triggering itself
  workflow_dispatch:
  schedule:
    - cron: '14 * * * *'

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Crucial: Gets full history tree
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai

      - name: Run Intel Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_intel.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Aeon-Intel-Bot"
          git config --global user.email "bot@aeon.intel"
          
          # 1. Fetch latest upstream state
          git fetch origin main
          
          # 2. Temporarily stash the generated template.js file to clear the workspace
          git stash --include-untracked
          
          # 3. Rebase the history tracking branch smoothly while the workspace is completely clean
          git rebase origin/main
          
          # 4. Pop the generated changes back into the workspace safely
          git stash pop || echo "No stashed changes found or minor merge conflict resolved automatically."
          
          # 5. Stage the updated target payload file
          git add template.js
          
          # 6. Use an airtight, native index check to verify structural differences
          if ! git diff --cached --quiet template.js; then
            
            # 7. Commit using the protected perimeter safety tag [skip ci]
            git commit -m "Automated Hourly Update: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            
            # 8. Execute an atomic, clean push back to main branch
            git push origin HEAD:main
          else
            echo "No changes detected in template.js. Skipping push payload sequence to prevent loops."
          fi
