name: Hourly Intel Automation
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'template.js'  # Block the bot from triggering itself
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Crucial: Gets full history tree

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai

      - name: Run Intel Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_intel.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Aeon-Intel-Bot"
          git config --global user.email "bot@aeon.intel"
          
          # 1. Fetch latest changes from remote main branch without merging yet
          git fetch origin main
          
          # 2. Tell our local Git runner to align its tracking branch pointer with upstream main
          # This cleans up the tracking state without touching our local template.js modification
          git merge-base origin/main HEAD
          
          # 3. Explicitly stage the updated template.js file
          git add template.js
          
          # 4. Check if there are actual structural changes compared to the remote origin
          if [[ -n $(git status -s template.js) ]]; then
            # Commit using [skip ci] as a safety perimeter guarantee
            git commit -m "Automated Hourly Update: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            
            # Push cleanly using a standard atomic push
            git push origin HEAD:main
          else
            echo "No changes detected. Skipping push to avoid deployment loop."
          fi
