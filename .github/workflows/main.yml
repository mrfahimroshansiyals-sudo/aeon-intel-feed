name: Hourly Intel Automation
on:
  schedule:
    - cron: '0 * * * *'  # This triggers at the 0th minute of every hour (UTC)
  workflow_dispatch:      # Allows you to click a button to run it manually

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai

      - name: Run Intel Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_intel.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Aeon-Intel-Bot"
          git config --global user.email "bot@aeon.intel"
          git add template.js
          git commit -m "Automated Hourly Update: $(date +'%Y-%m-%d %H:%M UTC')"
          git push
