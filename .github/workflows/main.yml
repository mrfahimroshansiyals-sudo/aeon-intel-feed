name: Hourly Intel Automation
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'template.js'  # Block the bot from triggering itself
      - 'post.txt'     # Block the bot from triggering itself on text updates
      - 'download/**'  # Block the bot from looping on its own image updates
  workflow_dispatch:
  schedule:
    - cron: '16 * * * *'  # Single Primary Precise Hourly Trigger (Exactly once per hour)

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Crucial: Gets full history tree
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai

      - name: Run Intel Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_intel.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Aeon-Intel-Bot"
          git config --global user.email "bot@aeon.intel"
          
          # 1. Fetch latest upstream state
          git fetch origin main
          
          # 2. Force Git to clear any local tracking discrepancies by resetting tracking pointer
          git reset --mixed origin/main
          
          # 3. Stage BOTH the freshly overwritten template.js and post.txt files generated this hour
          git add template.js post.txt
          
          # 4. Verify structural differences cleanly without stashing or merging files
          if ! git diff --cached --quiet; then
            
            # 5. Commit using the protected perimeter safety tag [skip ci]
            git commit -m "Automated Hourly Update: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            
            # 6. Force clean push directly into the remote target branch
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            
            # 7. Set tracking variable for email and screenshot phase
            echo "PUSH_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "No changes detected in template.js or post.txt. Skipping push payload sequence to prevent loops."
            echo "PUSH_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: Set up Node.js Environment
        if: env.PUSH_SUCCESS == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer Chromium Engines
        if: env.PUSH_SUCCESS == 'true' || github.event_name == 'workflow_dispatch'
        run: npm install puppeteer

      - name: Render and Synchronize Visual Slide Packages
        if: env.PUSH_SUCCESS == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # 1. Active Deployment Synchronizer: Programmatically poll the server endpoint until the fresh commit is live
          echo "Initiating live web server cache validation..."
          python - << 'EOF'
          import requests
          import time
          import json
          
          target_url = "https://mrfahimroshansiyals-sudo.github.io/aeon-intel-feed/template.js"
          success = False
          
          # Loop for up to 5 minutes (30 checks spaced 10 seconds apart)
          for attempt in range(30):
              try:
                  # Force clean network pull by appending an active cache-busting timestamp token
                  response = requests.get(f"{target_url}?nocache={int(time.time())}", timeout=10)
                  if response.status_code == 200 and "dailyData" in response.text:
                      print(f"Verified: Live GitHub Pages environment has completely synchronized on attempt {attempt + 1}.")
                      success = True
                      break
              except Exception as e:
                  print(f"Polling update server... Latency detected: {str(e)}")
              time.sleep(10)
          
          if not success:
              print("Warning: Network sync timed out. Moving directly to backup buffer gate.")
          EOF
          
          # 2. Hard structural safety buffer to allow complete CDN cache propogation across geographic edge networks
          sleep 15
          
          # 3. Fire the headless chrome browser capture tool inside the folder
          node download/capture_slides.js

      - name: Commit and Push Image Asset Directories
        if: env.PUSH_SUCCESS == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git fetch origin main
          git reset --mixed origin/main
          
          # Stage the newly populated folder paths explicitly
          git add download/
          
          if ! git diff --cached --quiet download/; then
            git commit -m "Automated Graphic Asset Synch: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "No graphical image binary variance detected. Skipping asset storage update."
          fi

      - name: Dispatch Reconfirmation Email Notification
        if: env.PUSH_SUCCESS == 'true'
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python - << 'EOF'
          import os
          import re
          import smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          try:
              # Read the freshly pushed template.js file
              with open('template.js', 'r', encoding='utf-8') as f:
                  content = f.read()

              # Read the freshly pushed post.txt file to embed in email body
              try:
                  with open('post.txt', 'r', encoding='utf-8') as pf:
                      post_content = pf.read().strip()
              except Exception:
                  post_content = "Error: post.txt content could not be pulled from workspace environment memory."

              # Safely extract titleWhite and titleBlue strings via Regex targeting JSON keys
              tw_match = re.search(r'"titleWhite"\s*:\s*"([^"]+)"', content)
              tb_match = re.search(r'"titleBlue"\s*:\s*"([^"]+)"', content)

              title_white = tw_match.group(1).strip() if tw_match else "AEON"
              title_blue = tb_match.group(1).strip() if tb_match else "INTEL"
              
              # Construct the raw dynamic text base string
              raw_subject = f"{title_white} {title_blue}"
              
              # Convert entire string to Proper Title Case as requested
              subject_line = raw_subject.title()
              
              recipient = "mr.fahim.roshan.siyals@gmail.com"
              sender = os.environ.get('EMAIL_USER')
              password = os.environ.get('EMAIL_PASS')

              # Build the Email Container
              msg = MIMEMultipart('alternative')
              msg['Subject'] = subject_line
              msg['From'] = f"Aeon Intel Core <{sender}>"
              msg['To'] = recipient

              # Minimalist, premium dark HTML notification body layout
              html_body = f"""
              <html>
                <body style="background-color: #0d1117; color: #c9d1d9; font-family: monospace; padding: 30px;">
                  <div style="max-width: 600px; margin: 0 auto; border: 1px solid #30363d; padding: 20px; border-radius: 6px; background-color: #161b22;">
                    <h2 style="color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 0;">⚡_ AEON INTEL SYSTEM DISPATCH</h2>
                    <p style="font-size: 14px; color: #8b949e;">Automated reconfirmation deployment pipeline executed successfully.</p>
                    <table style="width: 100%; font-size: 13px; border-collapse: collapse; margin: 20px 0;">
                      <tr>
                        <td style="padding: 6px 0; color: #8b949e; width: 140px;"><strong>Status:</strong></td>
                        <td style="padding: 6px 0; color: #56d364;">UPDATED & DEPLOYED</td>
                      </tr>
                      <tr>
                        <td style="padding: 6px 0; color: #8b949e;"><strong>Subject Context:</strong></td>
                        <td style="padding: 6px 0; color: #ffffff;">{subject_line}</td>
                      </tr>
                      <tr>
                        <td style="padding: 8px 0; color: #8b949e;"><strong>Live Feed URL:</strong></td>
                        <td style="padding: 8px 0;"><a href="https://mrfahimroshansiyals-sudo.github.io/aeon-intel-feed" style="color: #58a6ff; text-decoration: underline; font-weight: bold;">Launch Live Dashboard →</a></td>
                      </tr>
                    </table>
                    
                    <h3 style="color: #58a6ff; font-size: 14px; margin-top: 25px; margin-bottom: 10px; border-bottom: 1px solid #30363d; padding-bottom: 5px;">📱 SOCIAL MEDIA POST CONTENT (POST.TXT)</h3>
                    <pre style="background-color: #0d1117; border: 1px solid #30363d; padding: 15px; border-radius: 4px; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; margin: 10px 0;">{post_content}</pre>
                    
                    <p style="font-size: 11px; color: #8b949e; border-top: 1px solid #30363d; padding-top: 15px; margin-bottom: 0;">
                      This is an automated operational metric confirmation statement. Do not reply.
                    </p>
                  </div>
                </body>
              </html>
              """
              
              msg.attach(MIMEText(html_body, 'html'))

              # Connect to Gmail SMTP Gateway Securely
              server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
              server.login(sender, password)
              server.sendmail(sender, [recipient], msg.as_string())
              server.quit()
              print(f"Success: Notification email sent to {recipient} with subject: {subject_line}")

          except Exception as e:
              print(f"Error executing email step: {str(e)}")
          EOF
