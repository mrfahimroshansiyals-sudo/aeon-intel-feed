name: Hourly Intel Automation
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai

      - name: Run Intel Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_intel.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Aeon-Intel-Bot"
          git config --global user.email "bot@aeon.intel"
          # Sync with remote first to prevent rebase/push conflicts
          git pull origin main --rebase
          # Only commit if template.js has actually changed
          if [[ -n $(git status -s template.js) ]]; then
            git add template.js
            git commit -m "Automated Hourly Update: $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          else
            echo "No changes detected. Skipping push to avoid deployment loop."
          fi
