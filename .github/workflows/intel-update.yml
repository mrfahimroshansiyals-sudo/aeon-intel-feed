name: Hourly Intel Update
permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-intel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install google-genai beautifulsoup4 requests
      - name: Run Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_intel.py
      - name: Commit and Push
        run: |
          git config --global user.name "Aeon-Intel-Bot"
          git config --global user.email "bot@aeonintel.com"
          git add template.js
          git commit -m "Automated update"
          git push
